{{ define "main" }}
<h1>{{ .Site.Title }}</h1>
<p>{{ .Site.Params.description }}</p>
<h2>最新节目</h2>
<ul class="post-list">
  {{ range .Site.RegularPages.ByDate.Reverse }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a><div class="muted">{{ .Date.Format "2006-01-02" }}</div></li>
  {{ end }}
</ul>
{{ end }}
