<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;max-width:760px;margin:40px auto;padding:0 16px;line-height:1.8;color:#222}
    a{color:#0a66c2;text-decoration:none} a:hover{text-decoration:underline}
    h1,h2,h3{line-height:1.3} .muted{color:#666;font-size:14px} .post-list li{margin:10px 0}
    audio{margin:12px 0}
  </style>
</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
